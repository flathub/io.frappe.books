name: Check for upstream updates

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Mondays at 09:00 UTC
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  check-and-update:
    name: Check for and apply upstream update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y jq wget python3-pip pipx
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install flatpak-node-generator
        run: |
          pipx install \
            'git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run update script
        id: check
        run: |
          chmod +x update-manifest.sh
          ./update-manifest.sh

          if git diff --quiet; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            version=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' io.frappe.books.yml | head -1)
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Update to v$version is ready."
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated-update-${{ steps.check.outputs.version }}
          delete-branch: true
          commit-message: "chore: update to v${{ steps.check.outputs.version }}"
          title: "chore: update Frappe Books to v${{ steps.check.outputs.version }}"
          body: |
            ## Automated update to Frappe Books v${{ steps.check.outputs.version }}

            This PR was automatically generated by the [update workflow](../actions/workflows/check-for-updates.yml).

            ### Changes
            - `io.frappe.books.yml` — updated download URLs and SHA256 checksums
            - `io.frappe.books.appdata.xml` — added new `<release>` entry

            ### Next steps
            1. Wait for CI to finish building on all supported architectures
            2. Review the changes if needed
            3. Merge when CI passes ✅
          labels: automated-update
