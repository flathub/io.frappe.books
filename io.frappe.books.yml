app-id: io.frappe.books
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "24.08"
command: run.sh
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
rename-desktop-file: frappe-books.desktop
rename-icon: frappe-books
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
  - --env=ELECTRON_TRASH=gio
modules:
  - name: books
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin
      env:
        XDG_CACHE_HOME: /run/build/books/flatpak-node/cache
        npm_config_nodedir: /run/build/books/flatpak-node/cache/node-gyp/22.3.27
    sources:
      - type: git
        url: https://github.com/frappe/books.git
        tag: v0.36.0
        commit: 2f028f42be70a1dbd45bd4c6483d57df2fc64805

      - generated-sources.json

      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/frappe-books/frappe-books "$@"

      - type: file
        path: io.frappe.books.appdata.xml

    build-commands:
      # Configure yarn to use the pre-downloaded offline mirror
      - HOME=$PWD yarn config --offline set yarn-offline-mirror $FLATPAK_BUILDER_BUILDDIR/flatpak-node/yarn-mirror
      # Install all dependencies offline (postinstall runs electron-rebuild to
      # compile better-sqlite3 against the correct Electron ABI headers,
      # which flatpak-node-generator pre-downloads via --electron-node-headers)
      - yarn --offline
      # Build the main process (TypeScript via esbuild) and renderer (Vue/Vite)
      # without invoking electron-builder packaging yet
      - yarn build --nopackage
      # electron-builder's app dir (dist_electron/build/) has an empty
      # node_modules created during the build step.  Hard-link the full
      # node_modules tree into it so electron-builder can find the production
      # deps (knex, better-sqlite3, electron-store) and their transitive deps
      # without network access.  Hard-links are fast and add no disk overhead.
      - cp -rl node_modules/. dist_electron/build/node_modules/
      # Run electron-builder in directory (unpacked) mode so it produces a
      # plain directory rather than an installer.  The arch-args script is
      # generated by flatpak-node-generator for cross-arch support.
      - . flatpak-node/electron-builder-arch-args.sh; node_modules/.bin/electron-builder --linux dir $ELECTRON_BUILDER_ARCH_ARGS
      # Install the unpacked Electron app (glob handles the arch suffix)
      - cp -r dist_electron/bundled/linux*unpacked /app/frappe-books
      # Install the zypak wrapper script
      - install -Dm755 run.sh -t /app/bin/
      # Fix the desktop file Exec key to use our wrapper
      - desktop-file-edit --set-key="Exec" --set-value="run.sh %U" ${FLATPAK_DEST}/share/applications/frappe-books.desktop
      # Install AppStream metadata
      - install -Dm0644 io.frappe.books.appdata.xml ${FLATPAK_DEST}/share/appdata/${FLATPAK_ID}.appdata.xml
      # Re-encode the 512x512 icon so it is exactly 512x512 pixels
      - ffmpeg -i ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/frappe-books.png -vf scale=512:512 frappe-icon.png
      - mv frappe-icon.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/frappe-books.png
